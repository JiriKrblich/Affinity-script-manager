<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Affinity Script Manager</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/ace-builds@1.36.4/src-min-noconflict/ace.min.js"></script>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
    /* Native looking markdown styling for DARK MODE */
    .markdown-body h1 { font-size: 1.5rem; font-weight: 600; border-bottom: 1px solid #404040; padding-bottom: 0.5rem; margin-top: 1.5rem; margin-bottom: 1rem; color: #ffffff; }
    .markdown-body h2 { font-size: 1.25rem; font-weight: 600; margin-top: 1.5rem; margin-bottom: 0.75rem; color: #ffffff; }
    .markdown-body p { margin-bottom: 1rem; color: #d4d4d4; line-height: 1.6; }
    .markdown-body pre { background-color: #171717; padding: 1rem; border-radius: 0.375rem; border: 1px solid #404040; overflow-x: auto; margin-bottom: 1rem; }
    .markdown-body code { font-family: Consolas, Monaco, 'Andale Mono', 'Ubuntu Mono', monospace; font-size: 0.875rem; color: #a7f175; background: #262626; padding: 0.1rem 0.3rem; border-radius: 0.25rem; }
    .markdown-body pre code { color: #d4d4d4; background: transparent; padding: 0; }
    .markdown-body a { color: #a7f175; text-decoration: underline; }
    .markdown-body ul { list-style-type: disc; padding-left: 1.5rem; margin-bottom: 1rem; color: #d4d4d4; }
    
    /* Custom Scrollbar */
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #525252; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #737373; }
  </style>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app-frame">
    <header class="titlebar">
      <div class="titlebar-row">
        <div class="titlebar-name">
          <span class="tb-brand">Script Manager</span>
        </div>
        <div class="titlebar-ctrls">
          <button class="tb-ctrl" id="tb-min" title="Minimize"></button>
          <button class="tb-ctrl" id="tb-max" title="Maximize"></button>
          <button class="tb-ctrl danger" id="tb-close" title="Close"></button>
        </div>
      </div>
      <div class="titlebar-menu">
        <span class="tb-menu">File</span>
        <span class="tb-menu">Edit</span>
        <span class="tb-menu">View</span>
        <span class="tb-menu">Run</span>
        <span class="tb-menu">Window</span>
        <span class="tb-menu">Help</span>
      </div>
    </header>

    <div class="app-body">
      <aside class="sidebar">
        <div class="brand-lockup">
          <div class="brand-tile" id="brand-icon"></div>
          <div class="brand-text">
            <span class="brand-name">Script Manager</span>
            <span class="brand-ver" id="brand-version">v0.0.0</span>
          </div>
        </div>

        <nav class="nav" id="nav"></nav>

        <div class="sidebar-footer">
          <button class="accent-btn" id="btn-open-upload" style="width:100%">
            <span class="ico" id="ico-upload"></span> Upload Script
          </button>
          <div class="sb-meta" id="sb-meta-path">~/scripts</div>
          <div class="sb-meta" id="sb-meta-free"></div>
        </div>
      </aside>

      <main class="main" id="main"></main>
    </div>
  </div>

  <script src="icons.js" defer></script>
  <script src="renderer.js" defer></script>
</body>
</html>
