<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Script Manager for Affinity</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/ace-builds@1.36.4/src-min-noconflict/ace.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app-frame">
    <div class="app-body">
      <aside class="sidebar">
        <div class="brand-lockup">
          <div class="brand-text">
            <span class="brand-name">Script Manager</span>
            <span class="brand-ver" id="brand-version">v0.0.0</span>
            <button class="brand-update" id="btn-brand-update" hidden></button>
          </div>
          <button class="icon-btn brand-gh" id="btn-brand-gh" title="Script Manager on GitHub"></button>
        </div>

        <nav class="nav" id="nav"></nav>

        <div class="sidebar-footer">
          <div class="sb-drop" id="sb-drop">
            <span class="drop-ico" id="drop-ico"></span>
            <div class="drop-title">Drop <span class="drop-dot-js">.js</span> files here</div>
            <div class="drop-sub">or use the button below</div>
          </div>
          <button class="accent-btn" id="btn-open-upload" style="width:100%">
            <span class="ico" id="ico-upload"></span> Add Script
          </button>
        </div>
      </aside>

      <main class="main" id="main"></main>
    </div>
  </div>

  <script src="icons.js" defer></script>
  <script src="renderer.js" defer></script>
</body>
</html>
