<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Settings · Repositories</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<style>
  html, body { overflow: auto; }
  body { padding: 32px 36px; }
  .repo-row { display: flex; justify-content: space-between; align-items: center; padding: 14px 16px; border: 1px solid var(--border); background: var(--bg-card); margin-bottom: 8px; }
  .repo-row .name { font-size: 13px; color: var(--text-strong); }
  .repo-row .kind { font: 400 10px/1 var(--f-mono); color: var(--text-faint); text-transform: uppercase; letter-spacing: 1px; }
  .add { display: flex; gap: 8px; margin-bottom: 24px; }
  .add input { flex: 1; background: var(--bg-card); border: 1px solid var(--border-dim); color: var(--text-strong); padding: 10px 12px; font: 400 13px/1 var(--f-sans); }
  .add input:focus { border-color: var(--accent); outline: none; }
  h1.page-title { font: 600 28px/1.2 var(--f-sans); letter-spacing: -0.6px; color: var(--text-strong); margin: 10px 0 8px; }
</style>
</head>
<body>
  <div class="eyebrow">Settings</div>
  <h1 class="page-title">Community Repositories</h1>
  <p class="subhead" style="font-size:12px; color:var(--text); margin-bottom:24px;">Paste a GitHub URL (<span style="font-family:var(--f-mono); color:var(--text-strong);">https://github.com/user/repo</span>) to discover more scripts.</p>

  <div class="add">
    <input type="text" id="new-repo-url" placeholder="https://github.com/user/repository">
    <button class="accent-btn" id="btn-add-repo">Add</button>
  </div>

  <div class="eyebrow" style="margin-bottom:12px;">Active repositories</div>
  <div id="repo-list"></div>

<script>
const DEFAULT_REPO = 'https://raw.githubusercontent.com/JiriKrblich/Affinity-Community-Scripts/refs/heads/main/registry.json';
function getDisplayName(url) {
  const m = url.match(/raw\.githubusercontent\.com\/([^\/]+\/[^\/]+)/);
  return m ? m[1] : url;
}

async function load() {
  const res = await window.api.getRepos();
  const list = document.getElementById('repo-list'); list.innerHTML = '';
  if (!res.success) return;
  res.data.forEach(url => {
    const row = document.createElement('div'); row.className = 'repo-row';
    const displayName = getDisplayName(url);
    const isDefault = url === DEFAULT_REPO;
    row.innerHTML = `<div><div class="name">${displayName}</div></div>` +
      (isDefault ? `<span class="kind">Default</span>` : `<button class="gh-btn compact danger">Remove</button>`);
    if (!isDefault) {
      row.querySelector('button').onclick = async () => {
        if (!confirm(`Remove ${displayName}?`)) return;
        await window.api.removeRepo(url);
        load();
      };
    }
    list.appendChild(row);
  });
}

document.getElementById('btn-add-repo').onclick = async () => {
  const inp = document.getElementById('new-repo-url');
  const url = inp.value.trim();
  if (!url) return;
  const r = await window.api.addRepo(url);
  if (!r.success) { alert(r.error); return; }
  inp.value = ''; load();
};

document.getElementById('new-repo-url').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') document.getElementById('btn-add-repo').click();
});

window.addEventListener('DOMContentLoaded', load);
</script>
</body>
</html>
